services:
  postgres:
    image: postgres:16
    container_name: flowops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowops_user
      POSTGRES_PASSWORD: flowops_password
      POSTGRES_DB: flowops_db
    ports:
      - "5432:5432"
    volumes:
      - flowops_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: flowops_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  flowops_postgres_data:
