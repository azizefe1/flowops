services:
  postgres:
    image: postgres:16
    container_name: flowops_postgres
    environment:
      POSTGRES_USER: flowops_user
      POSTGRES_PASSWORD: flowops_password
      POSTGRES_DB: flowops_db
    ports:
      - "5432:5432"
    volumes:
      - flowops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowops_user -d flowops_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: flowops_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: flowops_backend
    environment:
      APP_NAME: FlowOps
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://flowops_user:flowops_password@postgres:5432/flowops_db
      SECRET_KEY: dev_secret_key_change_me_minimum_32_characters
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    container_name: flowops_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  flowops_postgres_data: